description: "This dataset covers all relevant information on every Afrotropical moth\
  \ species. The zoogeographic area covered can be defined as the Africa continent\
  \ south of the Sahara (i.e. excl. Morocco, Algeria, Tunisia, Libya and Egypt), the\
  \ islands in the Atlantic Ocean Amsterdam Island, Ascension, Cape Verde Archipelago,\
  \ Inaccessible Island, St. Helena, S\xE3o Tom\xE9 and Principe, Tristan da Cunha,\
  \ and the islands in the Indian Ocean Comores (Anjouan, Grande Comore, Mayotte,\
  \ Moh\xE9li), Madagascar, Mascarene Islands (La R\xE9union, Mauritius, Rodrigues),\
  \ Seychelles (F\xE9licit\xE9, Mah\xE9, Praslin, Silhouette, a.o.). Furthermore,\
  \ also those moth species occurring in the transition zone to the Palaearctic fauna\
  \ have been included, namely most of the Arabia Peninsula (Kuwait, Oman, Saudi Arabia,\
  \ United Arab Emirates, Yemen with Socotra) but not Iraq, Jordan and further north.\
  \ Also, some Saharan species have been included (e. g. Hoggar Mts. in Algeria, Tibesti\
  \ Mts. in South Libya). Utmost care was taken that the data incorporated in the\
  \ database are correct. We decline any responsibility in case of damage to soft-\
  \ or hardware based on information used in this website. Persons retrieving information\
  \ from this website for their own research or for applied aspects such as pest control\
  \ programmes, should acknowledge the usage of data from this website in the following\
  \ format  \"De Prins, J.& De Prins, W. 2011. Afromoths, online database of Afrotropical\
  \ moth species (Lepidoptera). World Wide Web electronic publication (www.afromoths.net)\""
