description: The database was originally designed using 3i Interactive Keys and Taxonomic
  Databases software and later migrated into TaxonWorks. The database has world checklist
  of the hemipteran suborder Auchenorrhyncha, which covers about 48,000 valid species,
  as well as their synonyms and subsequent combinations. It was designed and maintained
  with support from several grants from National Science Foundation (USA). Besides
  nomenclature, the database contains illustrations, descriptions, distribution records,
  biological associations, literature references and tools for taxon identification.
